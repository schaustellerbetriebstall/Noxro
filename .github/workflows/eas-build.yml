name: EAS Build & TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: EAS Build iOS (Preview)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Find app directory
        id: appdir
        run: |
          if [ -f "artifacts/noxro-app/app.json" ]; then
            echo "dir=artifacts/noxro-app" >> $GITHUB_OUTPUT
          elif [ -f "app.json" ]; then
            echo "dir=." >> $GITHUB_OUTPUT
          else
            echo "ERROR: app.json not found" && exit 1
          fi

      - name: Install dependencies
        run: npm install
        working-directory: ${{ steps.appdir.outputs.dir }}

      - name: Build iOS
        run: eas build --platform ios --profile preview --non-interactive
        working-directory: ${{ steps.appdir.outputs.dir }}
